<!-- Firebase SDK -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import{getFirestore,initializeFirestore,persistentLocalCache,doc,setDoc,getDoc,collection,getDocs,deleteDoc,writeBatch}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

// ══════════════════════════════════════════════
// 🔥 Firebase Config
// ══════════════════════════════════════════════
const firebaseConfig={
  apiKey:"AIzaSyCiPZjJ4v8adPfJZD_VhrqMvDQRmu6nh_g",
  authDomain:"personal-assistant-3eb30.firebaseapp.com",
  projectId:"personal-assistant-3eb30",
  storageBucket:"personal-assistant-3eb30.firebasestorage.app",
  messagingSenderId:"79705347651",
  appId:"1:79705347651:web:0b6a8186b06e94749466f6",
  measurementId:"G-2711QYPSBQ"
};
// ══════════════════════════════════════════════

const app=initializeApp(firebaseConfig);

// Firebase rules: allow read, write: if true — Auth লাগবে না
// Firestore init — persistentLocalCache with fallback
let db;
try{
  db=initializeFirestore(app,{
    localCache:persistentLocalCache()
  });
}catch(e){
  db=getFirestore(app);
}

// Device-based fixed UID — localStorage-এ persist করো
function getOrCreateUID(){
  const k="ta_device_uid";
  let uid=localStorage.getItem(k);
  if(!uid){
    uid="user_"+Math.random().toString(36).slice(2,10)+"_"+Date.now().toString(36);
    localStorage.setItem(k,uid);
  }
  return uid;
}

window._fbDb=db;
window._fbUid=getOrCreateUID();
window._fbReady=false;
window._fbAuthDone=true;

// ── Firestore Helper Functions ──────────────────
window.fbGetAll=async(col)=>{
  if(!window._fbUid)return null;
  try{
    const snap=await getDocs(collection(db,"users",window._fbUid,col));
    const arr=[];
    snap.forEach(d=>arr.push({...d.data(),_docId:d.id}));
    return arr;
  }catch(e){console.error("fbGetAll:",e);return null;}
};

window.fbSet=async(col,id,data)=>{
  if(!window._fbUid)return;
  try{
    await setDoc(doc(db,"users",window._fbUid,col,String(id)),data);
  }catch(e){console.error("fbSet:",e);}
};

window.fbDel=async(col,id)=>{
  if(!window._fbUid)return;
  try{
    await deleteDoc(doc(db,"users",window._fbUid,col,String(id)));
  }catch(e){console.error("fbDel:",e);}
};

window.fbGetSettings=async()=>{
  if(!window._fbUid)return null;
  try{
    const snap=await getDoc(doc(db,"users",window._fbUid,"settings","main"));
    return snap.exists()?snap.data():null;
  }catch(e){return null;}
};

window.fbSetSettings=async(data)=>{
  if(!window._fbUid)return;
  try{
    await setDoc(doc(db,"users",window._fbUid,"settings","main"),data);
  }catch(e){console.error("fbSetSettings:",e);}
};

window.fbSetCollection=async(col,arr,idField="id")=>{
  if(!window._fbUid||!arr)return;
  try{
    const snap=await getDocs(collection(db,"users",window._fbUid,col));
    const batch=writeBatch(db);
    snap.forEach(d=>batch.delete(d.ref));
    arr.forEach(item=>{
      const ref=doc(db,"users",window._fbUid,col,String(item[idField]||Date.now()));
      batch.set(ref,item);
    });
    await batch.commit();
  }catch(e){console.error("fbSetCollection:",e);}
};


</script>

function calGrid(yr,mo){
  const fd=new Date(yr,mo,1).getDay(),dm=new Date(yr,mo+1,0).getDate();
  const g=Array(fd).fill(null);
  for(let d=1;d<=dm;d++)g.push(d);
  while(g.length%7)g.push(null);
  return g;
}

function beep(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(type==="ring"){
      [0,.4,.8,1.2,1.6].forEach(t=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=880;
        g.gain.setValueAtTime(.35,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.35);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.38);
      });
    }else{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      [[880,0],[660,.15],[880,.3]].forEach(([f,t])=>o.frequency.setValueAtTime(f,ctx.currentTime+t));
      g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.55);
      o.start();o.stop(ctx.currentTime+.6);
    }
  }catch(_){}
}

    }
    if(fbLabels&&fbLabels.length>0){

        const modelFix={

// ── Alarm Engine ─────────────────────────────────────────
function checkAlarms(){
  const ds=tdy(),ts=nowT(),now=new Date();
  TASKS.forEach(t=>{
    if(!t.alarm||t.done)return;
    const key=`${t.id}-${ds}-${ts}`;
    if(fired.has(key))return;
    let fire=false;
    if(t.repeat==="once"&&t.date===ds&&t.alarmTime===ts)fire=true;
    if(t.repeat==="daily"&&t.alarmTime===ts)fire=true;
    if(t.repeat==="weekly"&&new Date(t.date).getDay()===now.getDay()&&t.alarmTime===ts)fire=true;
    if(t.repeat==="monthly"&&new Date(t.date).getDate()===now.getDate()&&t.alarmTime===ts)fire=true;
    if(fire){fired.add(key);showAlarmModal(t);}
  });
}
setInterval(checkAlarms,15000);

// ── Derived ──────────────────────────────────────────────
function getStats(){
  const yr=new Date().getFullYear();
  const moStr=`${yr}-${String(dMo+1).padStart(2,"0")}`;

  // আগের মাসগুলোর cumulative balance (carried forward)
  const prevTX=TX.filter(t=>{
    if(!t.date)return false;
    const tMoStr=t.date.substring(0,7); // "YYYY-MM"
    return tMoStr<moStr;
  });
  const prevInc=prevTX.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const prevExp=prevTX.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const carried=prevInc-prevExp;

  // এই মাসের লেনদেন
  const mTX=TX.filter(t=>t.date&&t.date.startsWith(moStr));
  const inc=mTX.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=mTX.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const cats={};
  mTX.filter(t=>t.type==="expense").forEach(t=>{cats[t.category]=(cats[t.category]||0)+t.amount;});

  // bal = আগের balance + এই মাসের net
  return{inc,exp,bal:carried+inc-exp,carried,cats};
}
function txByDate(){
  const m={};TX.forEach(t=>{if(!m[t.date])m[t.date]=[];m[t.date].push(t);});return m;
}
function tasksByDate(){
  const m={};
  TASKS.forEach(t=>{
    const ds=[t.date];if(t.repeat==="daily")ds.push(tdy());
    ds.forEach(d=>{if(!m[d])m[d]=[];if(!m[d].find(x=>x.id===t.id))m[d].push(t);});
  });
  return m;
}
function getTodayTasks(){
  const now=new Date();
  const targetDay=dDay||now.getDate();
  const targetMo=dMo;
  const targetYr=now.getFullYear();
  const targetDate=`${targetYr}-${String(targetMo+1).padStart(2,"0")}-${String(targetDay).padStart(2,"0")}`;
  const targetDow=new Date(targetDate).getDay();
  return TASKS.filter(t=>{
    if(t.done)return false;
    if(t.repeat==="daily")return true;
    if(t.repeat==="weekly"&&new Date(t.date).getDay()===targetDow)return true;
    if(t.repeat==="monthly"&&new Date(t.date).getDate()===targetDay)return true;
    return t.date===targetDate;
  });
}

          <div style="font-size:10px;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:3px">${t.alarm?'<span style="display:inline-flex;align-items:center;gap:2px;color:#d97706"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> '+fmt12(t.alarmTime)+' · </span>':""+""}${t.category}</div>
        </div>
      </div>`).join("")}
    ${todayTasks.length>4?`<div style="text-align:center;font-size:12px;color:#6b7280;cursor:pointer" onclick="switchTab('calendar')">আরও ${bn(todayTasks.length-4)}টি →</div>`:""}
  </div>`:""}

  <div class="box" style="margin-bottom:12px;padding:12px 14px">
    <div style="font-size:13px;font-weight:700;color:#2563eb;margin-bottom:10px;display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="9"/><polyline points="9 5 12 2 15 5"/><line x1="12" y1="22" x2="12" y2="15"/><polyline points="15 19 12 22 9 19"/><line x1="2" y1="12" x2="22" y2="12"/></svg> Monthly Cash Flow</div>

      {lb:"Total Inflow",v:s.inc,col:"#22c55e",bg:"rgba(34,197,94,.1)",ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>'},
      {lb:"Total Outflow",v:s.exp,col:"#f87171",bg:"rgba(248,113,113,.1)",ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>'},

    ].map(c=>`<div class="stat-card" style="background:${c.bg};border:1px solid ${c.col}25">

      ${topC.map(([cat,amt])=>`
        <div style="margin-bottom:9px">

    </div>`:""}
  </div>
  </div>`;
}

// ── Section: Calendar ─────────────────────────────────────
function renderCalendar(){
  const grid=calGrid(cYr,cMo);
  const today=tdy();
  const tbd=txByDate();
  const tskd=tasksByDate();

  let calCells="";
  grid.forEach((day,i)=>{
    const ds=day?selDate(day):null;
    const dtx=ds?(tbd[ds]||[]):[];
    const dtask=ds?(tskd[ds]||[]):[];
    const isToday=ds===today, isSel=cDay===day, dow=i%7;
    const hasAlarm=dtask.some(t=>!t.done&&t.alarm);
    const hasDone=dtask.some(t=>t.done);
    let cls="cal-cell"+(day?" has-day":"")+(isToday&&!isSel?" today":"")+(isSel?" selected":"");
    let dayCol=isSel?"#fff":dow===5?"#22c55e":dow===6?"#f87171":isToday?"#7dd3fc":"#cbd5e1";
    calCells+=`<div class="${cls}" onclick="${day?`selectCalDay(${day})`:""}" >
      ${day?`<div class="day-num" style="color:${dayCol};font-weight:${isToday?700:400}">${bn(day)}</div>
      <div class="dots">
        ${dtx.some(t=>t.type==="income")?'<div class="dot" style="background:#22c55e"></div>':""}
        ${dtx.some(t=>t.type==="expense")?'<div class="dot" style="background:#f87171"></div>':""}
        ${hasAlarm?'<div class="dot" style="background:#fbbf24"></div>':""}
        ${hasDone?'<div class="dot" style="background:#475569"></div>':""}
      </div>`:""}
    </div>`;
  });

  // Task form is now a popup modal — rendered separately in main render()

  // Selected day panel

    const ds=selDate(cDay);
    const dtx=tbd[ds]||[];
    const dtask=tskd[ds]||[];
    const inc=dtx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp=dtx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    dayPanel=`<div style="animation:fadein .15s ease">
      <div style="display:flex;justify-content:space-between;align-items:center;
        padding:10px 14px;background:#fff;border-radius:11px;margin-bottom:10px">
        <span style="font-size:14px;font-weight:700;color:#2563eb;display:flex;align-items:center;gap:5px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${fmtD(ds)}</span>
        ${(inc>0||exp>0)?`<span style="font-size:12px">${inc>0?`<span style="color:#22c55e">+${bdt(inc)} </span>`:""} ${exp>0?`<span style="color:#f87171">-${bdt(exp)}</span>`:""}</span>`:""}
      </div>
      ${dtask.length>0?`
        <div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:7px;display:flex;align-items:center;gap:5px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> কাজ (${bn(dtask.length)})
        </div>
        ${dtask.map(t=>`<div class="task-card${t.done?" done":""}" style="border-left-color:${pcol(t.priority)}">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div class="task-check${t.done?" checked":""}" style="border-color:${pcol(t.priority)};background:${t.done?pcol(t.priority):"transparent"}"
              onclick="toggleDone(${t.id})">
              ${t.done?'<span style="display:flex"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>':""}
            </div>
            <div style="flex:1;min-width:0">
              <div class="task-title" style="color:${t.done?"#475569":"#e2e8f0"};text-decoration:${t.done?"line-through":"none"}">${t.title}</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${t.note?6:0}px">
                ${t.alarm?`<span class="tag" style="background:rgba(251,191,36,.12);color:#d97706;display:inline-flex;align-items:center;gap:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> ${fmt12(t.alarmTime)}</span>`:""}
                <span class="tag" style="background:rgba(0,0,0,.06);color:#94887a">${t.category}</span>
                ${t.repeat!=="once"?`<span class="tag" style="background:rgba(96,165,250,.1);color:#60a5fa;display:inline-flex;align-items:center;gap:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> ${rptLbl(t.repeat)}</span>`:""}
              </div>
              ${t.note?`<div style="font-size:12px;color:#94887a;line-height:1.6;background:#fff;border-radius:8px;padding:7px 10px">${t.note}</div>`:""}
            </div>
            <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
              <button class="ic-btn" onclick="startEditTask(${t.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
              <button class="ic-btn red" onclick="deleteTask(${t.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
            </div>
          </div>
        </div>`).join("")}
      `:""}
      ${dtx.length>0?`
        <div style="font-size:12px;font-weight:700;color:#2563eb;margin-bottom:7px;display:flex;align-items:center;gap:5px;margin-top:4px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/></svg> লেনদেন (${bn(dtx.length)})
        </div>
        ${dtx.map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;
          padding:9px 11px;margin-bottom:7px;border-radius:9px;background:#fff;
          border-left:3px solid ${t.type==="income"?"#22c55e":"#f87171"}">
          <div>
            <span style="font-size:11px;color:${t.type==="income"?"#22c55e":"#f87171"}">${t.category}</span>
            ${t.note?`<div style="font-size:12px;color:#94887a;margin-top:2px">${t.note}</div>`:""}
          </div>
          <div style="font-size:14px;font-weight:700;color:${t.type==="income"?"#22c55e":"#f87171"}">
            ${t.type==="income"?"+":"-"}${bdt(t.amount)}
          </div>
        </div>`).join("")}
      `:""}
      ${dtask.length===0&&dtx.length===0?`<div style="text-align:center;padding:20px 0;color:#94887a;font-size:13px">এই দিনে কোনো তথ্য নেই</div>`:""}
    </div>`;
  } else {
    // All tasks list
    const pending=TASKS.filter(t=>!t.done).length;
    dayPanel=`
      <div style="font-size:13px;font-weight:700;color:#d97706;margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:5px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> সব কাজ (${bn(pending)} বাকি)
      </div>
      ${TASKS.length===0?`<div style="text-align:center;padding:30px 0;color:#94887a">
        <div style="display:flex;justify-content:center"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
        <div style="margin-top:8px;font-size:14px">কোনো কাজ নেই</div>
      </div>`:""}

          <div class="task-check${t.done?" checked":""}" style="border-color:${pcol(t.priority)};background:${t.done?pcol(t.priority):"transparent"}"
            onclick="toggleDone(${t.id})">
            ${t.done?'<span style="display:flex"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>':""}
          </div>
          <div style="flex:1;min-width:0">
            <div class="task-title" style="color:${t.done?"#475569":"#e2e8f0"};text-decoration:${t.done?"line-through":"none"}">${t.title}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <span style="font-size:10px;color:#94887a;display:inline-flex;align-items:center;gap:2px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtD(t.date)}</span>
              ${t.alarm?`<span style="font-size:10px;color:#d97706;display:inline-flex;align-items:center;gap:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> ${fmt12(t.alarmTime)}</span>`:""}
              <span class="tag" style="background:rgba(0,0,0,.05);color:#94887a">${t.category}</span>
              ${t.repeat!=="once"?`<span style="font-size:10px;color:#60a5fa;display:inline-flex;align-items:center;gap:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> ${rptLbl(t.repeat)}</span>`:""}
            </div>
            ${t.note?`<div style="font-size:11px;color:#6b7280;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note}</div>`:""}
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button class="ic-btn" onclick="startEditTask(${t.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="ic-btn red" onclick="deleteTask(${t.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
          </div>
        </div>
      </div>`).join("")}`;

  return `<div class="section">
    <button onclick="toggleTaskForm()" style="width:100%;padding:11px 0;border-radius:11px;border:none;cursor:pointer;
      margin-bottom:12px;font-size:14px;font-weight:700;font-family:inherit;
      background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff">
      <span style="display:inline-flex;align-items:center;gap:6px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> নতুন কাজ যোগ করো</span>
    </button>
    ${dayPanel}
  </div>`;
}

function renderTransactions(){

      <div class="type-row">

          <button class="type-btn" onclick="tForm.type='${t}';tForm.category='${t==="income"?"বেতন":"খাবার"}';render()"
            style="background:${tForm.type===t?(t==="income"?"#16a34a":"#dc2626"):"rgba(255,255,255,.07)"};

      <input class="inp" type="date" value="${tForm.date}" oninput="tForm.date=this.value"/>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveTx()">সংরক্ষণ করো</button>
        <button class="btn-cancel" onclick="tOpen=false;tEdit=null;render()">বাতিল</button>
      </div>
    </div>`;
  }

  return `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="display:flex;gap:6px">
        ${[["all","সব"],["income","আয়"],["expense","খরচ"]].map(([k,l])=>`
          <button onclick="tFilt='${k}';render()" style="padding:6px 11px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:inherit;
            background:${tFilt===k?(k==="income"?"#16a34a":k==="expense"?"#dc2626":"#2563eb"):"rgba(255,255,255,.07)"};
            color:${tFilt===k?"#fff":"#64748b"}">${l}</button>`).join("")}
      </div>
      <select class="inp" style="width:auto;margin-bottom:0;padding:5px 8px;font-size:12px;cursor:pointer"
        onchange="tMo=Number(this.value);render()">
        ${monthOptions(tMo)}
      </select>
    </div>
    ${formHtml}
    ${list.length===0?`<div style="text-align:center;padding:50px 20px;color:#94887a">
      <div style="display:flex;justify-content:center"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
      <div style="margin-top:12px;font-size:15px">কোনো লেনদেন নেই</div>
    </div>`:""}
    ${list.map(t=>`<div class="tx-card" style="border:1px solid ${t.type==="income"?"rgba(34,197,94,.2)":"rgba(248,113,113,.2)"};border-left:4px solid ${t.type==="income"?"#22c55e":"#f87171"}">
      <div style="flex:1;min-width:0">
        <span class="tag" style="background:${t.type==="income"?"rgba(34,197,94,.15)":"rgba(248,113,113,.15)"};color:${t.type==="income"?"#22c55e":"#f87171"}">${t.category}</span>
        ${t.note?`<div style="font-size:12px;color:#94887a;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note}</div>`:""}
        <div style="font-size:10px;color:#94887a;margin-top:4px">${fmtD(t.date)}</div>
      </div>
      <div class="tx-actions">
        <div style="font-size:14px;font-weight:700;color:${t.type==="income"?"#22c55e":"#f87171"}">${t.type==="income"?"+":"-"}${bdt(t.amount)}</div>
        <button class="ic-btn" onclick="startEditTx(${t.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        ${tDel===t.id
          ?`<button style="background:rgba(220,38,38,.85);border:none;border-radius:6px;padding:5px 7px;cursor:pointer;font-size:10px;color:#fff;font-family:inherit" onclick="confirmDeleteTx(${t.id})">নিশ্চিত?</button>`
          :`<button class="ic-btn red" onclick="tDel=${t.id};render()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`}
      </div>
    </div>`).join("")}
    <button onclick="tOpen=!tOpen;tEdit=null;tForm={type:'expense',amount:'',category:'খাবার',note:'',date:tdy()};render()"
      style="position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;
        background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;cursor:pointer;
        font-size:24px;box-shadow:0 6px 22px rgba(59,130,246,.5);color:#fff;
        display:flex;align-items:center;justify-content:center">+</button>
  </div>`;
}

// ── Section: Notes ────────────────────────────────────────
function renderNotes(){
  const q=noteSearch.toLowerCase();

  // ── PIN / Lock helpers ────────────────────────────────
  function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return h.toString(36);}
  const hasPIN=!!NOTE_PIN;

  // ── Trash view ────────────────────────────────────────
  if(noteView==="trash"){
    const trashList=TRASH.filter(n=>!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q))
      .sort((a,b)=>b.deletedAt-a.deletedAt);
    const daysLeft=n=>Math.max(0,30-Math.floor((Date.now()-n.deletedAt)/(24*60*60*1000)));
    return `<div class="section">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 12px;background:rgba(220,38,38,.07);border-radius:11px;border:1px solid rgba(220,38,38,.2)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        <span style="font-size:12px;color:#dc2626;font-weight:600;flex:1">Recently Deleted</span>
        <span style="font-size:10px;color:#94887a">${bn(trashList.length)}টি নোট</span>
        ${trashList.length>0?`<button onclick="emptyTrash()" style="background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.25);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:11px;color:#dc2626;font-family:inherit;font-weight:600">সব মুছো</button>`:""}
      </div>
      <div class="note-search-wrap" style="margin-bottom:14px">
        <span class="note-search-icon" style="display:flex"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input class="note-search" placeholder="ডিলিট করা নোট খোঁজো..." value="${noteSearch}" oninput="noteSearch=this.value;render()"/>
      </div>
      ${trashList.length===0?`<div style="text-align:center;padding:60px 20px;color:#94887a">
        <div style="display:flex;justify-content:center;margin-bottom:14px;color:#dc263650"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>
        <div style="font-size:14px;color:#6b7280;font-weight:600">Recently Deleted খালি</div>
        <div style="font-size:12px;color:#94887a;margin-top:6px">মুছে দেওয়া নোট এখানে ৩০ দিন থাকবে</div>
      </div>`:`<div class="notes-grid">${trashList.map(n=>{
        const c=NOTE_COLORS[n.color]||NOTE_COLORS[0];
        const dl=daysLeft(n);
        return `<div class="note-card" style="background:${c.bg};border-color:${c.border};opacity:.85">
          ${n.title?`<div class="nc-title">${n.title.replace(/</g,"&lt;")}</div>`:""}
          ${n.body?`<div class="nc-body">${n.body.replace(/</g,"&lt;").replace(/\n/g,"<br/>")}</div>`:""}
          <div class="nc-date" style="color:#f87171">${dl===0?"আজই মুছে যাবে":bn(dl)+" দিন বাকি"}</div>
          <div style="display:flex;gap:6px;margin-top:8px">
            <button onclick="event.stopPropagation();restoreNote(${n.id})"
              style="flex:1;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:7px;padding:5px 0;cursor:pointer;font-size:11px;color:#22c55e;font-family:inherit;font-weight:600">↩ পুনরুদ্ধার</button>
            <button onclick="event.stopPropagation();permanentDelete(${n.id})"
              style="flex:1;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);border-radius:7px;padding:5px 0;cursor:pointer;font-size:11px;color:#dc2626;font-family:inherit;font-weight:600">✕ মুছো</button>
          </div>
        </div>`;
      }).join("")}</div>`}
    </div>`;
  }

  // ── Locked view ───────────────────────────────────────
  if(noteView==="locked"){
    if(!hasPIN&&!lockSetupOpen){
      return `<div class="section">
        <div style="text-align:center;padding:50px 20px">
          <div style="display:flex;justify-content:center;margin-bottom:16px">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div style="font-size:16px;font-weight:700;color:#1e2a3a;margin-bottom:8px">Locked Notes</div>
          <div style="font-size:13px;color:#6b7280;line-height:1.8;margin-bottom:24px">পার্সোনাল নোট লক করে রাখো।<br>প্রথমে একটি PIN সেট করো।</div>
          <button onclick="lockSetupOpen=true;lockSetupStep=1;lockPinInput='';lockConfirmInput='';render()"
            style="background:linear-gradient(135deg,#5b21b6,#7c3aed);border:none;border-radius:12px;padding:13px 32px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
            🔐 PIN সেট করো
          </button>
        </div>
      </div>`;
    }
    if(lockSetupOpen){
      const isConfirm=lockSetupStep===2;
      const curInput=isConfirm?lockConfirmInput:lockPinInput;
      return `<div class="section">
        <div style="max-width:320px;margin:0 auto;padding:30px 0">
          <div style="text-align:center;margin-bottom:28px">
            <div style="display:flex;justify-content:center;margin-bottom:12px">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div style="font-size:16px;font-weight:700;color:#1e2a3a">${isConfirm?"PIN নিশ্চিত করো":"নতুন PIN দাও"}</div>
            <div style="font-size:12px;color:#94887a;margin-top:5px">${isConfirm?"আবার একই PIN লিখো":"৪ সংখ্যার PIN"}</div>
          </div>
          <!-- PIN dots -->
          <div style="display:flex;justify-content:center;gap:16px;margin-bottom:32px">
            ${[0,1,2,3].map(i=>`<div style="width:18px;height:18px;border-radius:50%;background:${curInput.length>i?"#7c3aed":"transparent"};border:2px solid ${curInput.length>i?"#7c3aed":"#94887a"};transition:all .15s"></div>`).join("")}
          </div>
          <!-- Numpad -->
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto">
            ${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k=>`
              <button onclick="${k==="⌫"?(isConfirm?"lockConfirmInput=lockConfirmInput.slice(0,-1)":"lockPinInput=lockPinInput.slice(0,-1)"):k===""?"null":(isConfirm?"if(lockConfirmInput.length<4)lockConfirmInput+=String(${k})":"if(lockPinInput.length<4)lockPinInput+=String(${k})")};render()"
                style="padding:18px 0;border-radius:50%;border:none;background:${k===""?"transparent":"rgba(124,58,237,.08)"};cursor:${k===""?"default":"pointer"};font-size:${k==="⌫"?"20px":"18px"};font-weight:600;color:${k===""?"transparent":"#1e2a3a"};font-family:inherit;aspect-ratio:1;display:flex;align-items:center;justify-content:center">${k}</button>`).join("")}
          </div>
          <div style="display:flex;gap:10px;margin-top:28px">
            <button onclick="lockSetupOpen=false;lockPinInput='';lockConfirmInput='';lockSetupStep=1;render()"
              style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(0,0,0,.12);background:transparent;color:#6b7280;cursor:pointer;font-family:inherit">বাতিল</button>
            <button onclick="confirmPinSetup()"
              style="flex:1;padding:12px;border-radius:10px;border:none;background:${curInput.length===4?"linear-gradient(135deg,#5b21b6,#7c3aed)":"#e2d9cf"};color:${curInput.length===4?"#fff":"#94887a"};cursor:${curInput.length===4?"pointer":"not-allowed"};font-weight:700;font-family:inherit">
              ${isConfirm?"সেট করো":"পরবর্তী →"}
            </button>
          </div>
        </div>
      </div>`;
    }
    if(!lockUnlocked&&!lockedEditorOpen){
      return `<div class="section">
        <div style="max-width:320px;margin:0 auto;padding:30px 0">
          <div style="text-align:center;margin-bottom:28px">
            <div style="display:flex;justify-content:center;margin-bottom:12px">
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div style="font-size:16px;font-weight:700;color:#1e2a3a">PIN দিয়ে আনলক করো</div>
            <div style="font-size:12px;color:#94887a;margin-top:5px">তোমার ৪ সংখ্যার PIN লিখো</div>
          </div>
          <div style="display:flex;justify-content:center;gap:16px;margin-bottom:32px">
            ${[0,1,2,3].map(i=>`<div style="width:18px;height:18px;border-radius:50%;background:${lockPinInput.length>i?"#7c3aed":"transparent"};border:2px solid ${lockPinInput.length>i?"#7c3aed":"#94887a"};transition:all .15s"></div>`).join("")}
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto">
            ${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k=>`
              <button onclick="${k==="⌫"?"lockPinInput=lockPinInput.slice(0,-1)":k===""?"null":"if(lockPinInput.length<4)lockPinInput+=String("+k+")"};if(lockPinInput.length===4)tryUnlock();render()"
                style="padding:18px 0;border-radius:50%;border:none;background:${k===""?"transparent":"rgba(124,58,237,.08)"};cursor:${k===""?"default":"pointer"};font-size:${k==="⌫"?"20px":"18px"};font-weight:600;color:${k===""?"transparent":"#1e2a3a"};font-family:inherit;aspect-ratio:1;display:flex;align-items:center;justify-content:center">${k}</button>`).join("")}
          </div>
          <div style="display:flex;justify-content:center;margin-top:20px">
            <button onclick="lockSetupOpen=true;lockSetupStep=1;lockPinInput='';lockConfirmInput='';NOTE_PIN='';lsSet('ta_note_pin','');render()"
              style="background:transparent;border:none;cursor:pointer;font-size:12px;color:#94887a;font-family:inherit;text-decoration:underline">PIN ভুলে গেছি (রিসেট)</button>
          </div>
        </div>
      </div>`;
    }
    // Unlocked — show locked notes
    const lockedNotes=NOTES.filter(n=>n.locked&&(!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)));
    const noteCardLocked=(n)=>{
      const c=NOTE_COLORS[n.color]||NOTE_COLORS[0];
      return `<div class="note-card" style="background:${c.bg};border-color:${c.border}" onclick="openLockedNoteEditor(${n.id})">
        <div class="nc-pin" style="display:flex;color:#a78bfa"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        ${n.title?`<div class="nc-title" style="padding-left:18px">${n.title.replace(/</g,"&lt;")}</div>`:""}
        ${n.body?`<div class="nc-body">${n.body.replace(/</g,"&lt;").replace(/\n/g,"<br/>")}</div>`:""}
        <div class="nc-date">${fmtD(n.date)}</div>
        <button class="nc-del" onclick="event.stopPropagation();deleteNote(${n.id})" style="display:flex;align-items:center;justify-content:center"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>`;
    };
    // Locked note editor
    if(lockedEditorOpen){
      const nbg=NOTE_COLORS[noteForm.color]?.bg||"#ede8e2";
      return `<div class="section">
        <div class="note-editor" style="background:${nbg};animation:nefadein .15s ease">
          <div class="ne-topbar" style="padding:8px 10px;gap:4px">
            <button class="ne-topbar-btn" onclick="saveLockedNote()">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <div class="ne-color-row" style="flex:1;min-width:0">
              ${NOTE_COLORS.map((c,i)=>`<div class="ne-color-dot ${noteForm.color===i?"active":""}" style="background:${c.bg};border-color:${noteForm.color===i?"#1e2a3a":c.border}" onclick="noteForm.color=${i};document.querySelector('.note-editor').style.background='${c.bg}';render()" title="${c.label}"></div>`).join("")}
            </div>
            <span style="font-size:11px;color:#a78bfa;display:flex;align-items:center;gap:4px;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Locked</span>
            <button class="ne-topbar-btn" onclick="if(noteEdit!==null){deleteNote(noteEdit)}else{lockedEditorOpen=false;render()}" style="color:rgba(248,113,113,.7);margin-left:4px">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
          <div class="ne-content">
            <input class="note-inp-title" placeholder="শিরোনাম..." value="${noteForm.title.replace(/"/g,"&quot;")}" oninput="noteForm.title=this.value"/>
            <textarea class="note-inp-body" placeholder="নোট লিখো..." oninput="noteForm.body=this.value">${noteForm.body.replace(/</g,"&lt;")}</textarea>
          </div>
        </div>
      </div>`;
    }
    return `<div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 10px;background:rgba(124,58,237,.07);border-radius:11px;border:1px solid rgba(124,58,237,.2)">
        <span style="font-size:12px;font-weight:700;color:#7c3aed;display:flex;align-items:center;gap:6px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Locked Notes</span>
        <button onclick="lockUnlocked=false;lockPinInput='';render()" style="background:transparent;border:none;cursor:pointer;font-size:11px;color:#94887a;font-family:inherit;padding:3px 7px;border-radius:6px;border:1px solid rgba(0,0,0,.1)">🔒 লক করো</button>
      </div>
      <div class="note-search-wrap" style="margin-bottom:14px">
        <span class="note-search-icon" style="display:flex"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input class="note-search" placeholder="লক করা নোট খোঁজো..." value="${noteSearch}" oninput="noteSearch=this.value;render()"/>
      </div>
      ${lockedNotes.length===0?`<div style="text-align:center;padding:50px 20px;color:#94887a">
        <div style="display:flex;justify-content:center;margin-bottom:12px"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div style="font-size:14px;font-weight:600;color:#6b7280">কোনো লক করা নোট নেই</div>
        <div style="font-size:12px;color:#94887a;margin-top:6px">নোট এডিটরে 🔒 বাটন চেপে নোট লক করো</div>
      </div>`:`<div class="notes-grid">${lockedNotes.map(noteCardLocked).join("")}</div>`}
      <button onclick="openLockedNoteEditor(null)"
        style="position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;
          background:linear-gradient(135deg,#5b21b6,#7c3aed);border:none;cursor:pointer;
          font-size:26px;box-shadow:0 6px 22px rgba(124,58,237,.5);color:#fff;
          display:flex;align-items:center;justify-content:center;z-index:200">+</button>
    </div>`;
  }

  // ── Normal / Uncategorized views ──────────────────────
  const matchesLabel=(n)=>{
    if(noteView==="uncategorized") return (!n.labels||n.labels.length===0);
    if(activeLabel) return n.labels&&n.labels.includes(activeLabel);
    return true;
  };
  const visibleNotes=NOTES.filter(n=>!n.locked&&matchesLabel(n)&&(!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)));
  const pinned=visibleNotes.filter(n=>n.pinned);
  const others=visibleNotes.filter(n=>!n.pinned);
  const sorted=[...pinned,...others];

  const noteCard=(n)=>{
    const c=NOTE_COLORS[n.color]||NOTE_COLORS[0];
    const bodyHtml=bodyWithLinks(n.body);
    const noteLabels=(n.labels||[]).map(lid=>LABELS.find(lb=>lb.id===lid)).filter(Boolean);
    const isCtxOpen=noteCardCtx.open&&noteCardCtx.noteId===n.id;
    // ছবির মতো compact link row — প্রতিটা লিংক একটা row
    const links=extractLinks(n.body);
    const linkRows=links.map(url=>`
      <a href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"
        style="display:flex;align-items:center;gap:6px;margin-top:5px;
          padding:5px 7px;border-radius:7px;background:rgba(0,0,0,.07);
          text-decoration:none;overflow:hidden">
        <span style="display:flex;flex-shrink:0;color:#64748b">${domainIcon(getDomain(url))}</span>
        <span style="flex:1;min-width:0">
          <span style="display:block;font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${getDomain(url)}</span>
        </span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94887a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>`).join("");
    return `<div class="note-card" style="background:${c.bg};border-color:${isCtxOpen?"#2563eb":c.border};${isCtxOpen?"box-shadow:0 0 0 2px rgba(37,99,235,.35);":""}"
      onclick="if(!noteCardCtx.open)openNoteEditor(${n.id})"
      oncontextmenu="event.preventDefault();openNoteCardCtx(${n.id},event)"
      ontouchstart="startNcLongPress(${n.id},event)"
      ontouchend="cancelNcLongPress()"
      ontouchmove="cancelNcLongPress()">
      ${n.pinned?`<div class="nc-pin" style="display:flex"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>`:""}
      ${n.title?`<div class="nc-title" style="${n.pinned?"padding-left:18px":""}">${n.title.replace(/</g,"&lt;")}</div>`:""}
      ${n.body?`<div class="nc-body">${bodyHtml}</div>`:""}
      ${linkRows}
      ${noteLabels.length>0?`<div class="nc-labels">${noteLabels.map(lb=>`<span class="nc-label-chip">${lb.name}</span>`).join("")}</div>`:""}
      <button class="nc-del" onclick="event.stopPropagation();deleteNote(${n.id})" style="display:flex;align-items:center;justify-content:center"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`;
  };

  // Editor — full-screen Google Keep style
  const nbg=NOTE_COLORS[noteForm.color]?.bg||"#ede8e2";
  const editorModal=noteEditorOpen?`
    <div class="note-editor" style="background:${nbg};animation:nefadein .15s ease">
      <div class="ne-topbar" style="padding:8px 10px;gap:4px">
        <button class="ne-topbar-btn" onclick="saveNote()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <div class="ne-color-row" style="flex:1;min-width:0">
          ${NOTE_COLORS.map((c,i)=>`
            <div class="ne-color-dot ${noteForm.color===i?"active":""}"

        <button class="ne-topbar-btn ${noteForm.pinned?"active":""}" onclick="noteForm.pinned=!noteForm.pinned;render()" title="পিন">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${noteForm.pinned?"#fbbf24":"none"}" stroke="${noteForm.pinned?"#fbbf24":"currentColor"}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>

        <button class="ne-topbar-btn" onclick="noteForm.locked=!noteForm.locked;render()" title="লক" style="color:${noteForm.locked?"#7c3aed":"rgba(0,0,0,.45)"}">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="${noteForm.locked?"rgba(167,139,250,.3)":"none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        <button class="ne-topbar-btn" onclick="if(noteEdit!==null){deleteNote(noteEdit)}else{closeNoteEditor()}" style="color:rgba(248,113,113,.7)">

      <div class="ne-content">

            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>লেবেল

  const activeLabelObj=activeLabel?LABELS.find(lb=>lb.id===activeLabel):null;
  const viewBanner=noteView==="uncategorized"?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding:6px 10px;background:rgba(100,116,139,.08);border-radius:10px;border:1px solid rgba(100,116,139,.2)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    <span style="font-size:12px;font-weight:700;color:#7c3aed">${activeLabelObj.name}</span>
    <button onclick="activeLabel=null;render()" style="margin-left:auto;background:transparent;border:none;cursor:pointer;color:#94887a;font-size:10px;padding:2px 6px;border-radius:5px;border:1px solid rgba(0,0,0,.1)">সব দেখাও ✕</button>
  </div>`:"";

  return `<div class="section">
    ${noteCardCtx.open?`
    <div class="nc-ctx-overlay" onclick="closeNoteCardCtx()"></div>
    <div class="nc-ctx-popup" id="nc-ctx-popup" style="top:${noteCardCtx.y}px;left:${noteCardCtx.x}px">
      ${(()=>{
        const n=NOTES.find(x=>x.id===noteCardCtx.noteId);
        if(!n)return "";

        // লেবেল picker sub-view
        if(noteCardCtx.labelPicker){
          return `
          <div style="display:flex;align-items:center;gap:6px;padding:10px 14px 8px;border-bottom:1px solid rgba(0,0,0,.07)">
            <button onclick="event.stopPropagation();noteCardCtx.labelPicker=false;render()"
              style="background:transparent;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:#64748b">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <span style="font-size:12px;font-weight:700;color:#374151">লেবেল যুক্ত করো</span>
          </div>
          ${LABELS.length===0?`
            <div style="text-align:center;padding:20px 14px;color:#94887a;font-size:12px">
              কোনো লেবেল নেই।<br/>আগে লেবেল তৈরি করো।
            </div>
          `:`
            <div style="max-height:200px;overflow-y:auto;padding:6px 0">
              ${LABELS.map(lb=>{
                const hasLabel=(n.labels||[]).includes(lb.id);
                return `<button class="nc-ctx-item" onclick="event.stopPropagation();ncCtxToggleLabel(${n.id},'${lb.id}')"
                  style="color:${hasLabel?"#7c3aed":"#1e2a3a"}">
                  <span style="width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
                    background:${hasLabel?"rgba(124,58,237,.18)":"rgba(0,0,0,.06)"};border:1.5px solid ${hasLabel?"#7c3aed":"rgba(0,0,0,.15)"}">
                    ${hasLabel?`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:""}
                  </span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                  ${lb.name}
                </button>`;
              }).join("")}
            </div>
          `}`;
        }

        // মূল popup
        return `
        <div class="nc-ctx-color-label">রঙ পরিবর্তন করো</div>
        <div class="nc-ctx-color-row">
          ${NOTE_COLORS.map((cc,i)=>{
            const active=n.color===i;
            return `<div class="nc-ctx-color-dot ${active?"active":""}"
              style="background:${cc.bg};border-color:${active?"#1e2a3a":cc.border}"
              title="${cc.label}"
              onclick="event.stopPropagation();setNoteCardColor(${n.id},${i})"></div>`;
          }).join("")}
        </div>
        <button class="nc-ctx-item" onclick="event.stopPropagation();openNoteEditor(${n.id});closeNoteCardCtx()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          সম্পাদনা করো
        </button>
        <button class="nc-ctx-item" onclick="event.stopPropagation();ncCtxTogglePin(${n.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          ${n.pinned?"পিন সরাও":"পিন করো"}

        <button class="nc-ctx-item" onclick="event.stopPropagation();ncCtxCopy(${n.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          কপি করো
        </button>
        <button class="nc-ctx-item" onclick="event.stopPropagation();ncCtxShare(${n.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          শেয়ার করো
        </button>
        <button class="nc-ctx-item" onclick="event.stopPropagation();noteCardCtx.labelPicker=true;render()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          লেবেল যুক্ত করো
          ${(n.labels||[]).length>0?`<span style="margin-left:auto;font-size:10px;background:rgba(124,58,237,.15);color:#7c3aed;padding:2px 7px;border-radius:20px;font-weight:700">${(n.labels||[]).length}</span>`:""}
        </button>
        <button class="nc-ctx-item danger" onclick="event.stopPropagation();deleteNote(${n.id});closeNoteCardCtx()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>

    </div>
    ${sorted.length===0?`
      <div style="text-align:center;padding:60px 20px;color:#94887a">
        <div style="display:flex;justify-content:center;margin-bottom:14px"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
        <div style="font-size:15px;color:#6b7280;font-weight:600;margin-bottom:6px">কোনো নোট নেই</div>
        <div style="font-size:12px;color:#94887a">${noteSearch?"এই নামে কোনো নোট পাওয়া যায়নি।":noteView==="uncategorized"?"লেবেলবিহীন কোনো নোট নেই।":activeLabelObj?`"${activeLabelObj.name}" লেবেলে কোনো নোট নেই।`:"নিচের বাটনে ক্লিক করে প্রথম নোট যোগ করো।"}</div>

    <button onclick="openNoteEditor(null)"

// ── Notes Actions ─────────────────────────────────────────
function openNoteEditor(id){
  if(id===null){
    noteEdit=null;
    noteForm={title:"",body:"",color:0,pinned:false,locked:false,labels:activeLabel?[activeLabel]:[]};
  } else {
    const n=NOTES.find(x=>x.id===id);
    if(!n)return;
    noteEdit=id;
    noteForm={title:n.title,body:n.body,color:n.color,pinned:n.pinned,locked:n.locked||false,labels:n.labels||[]};
  }
  noteEditorOpen=true;render();
  setTimeout(()=>{
    const ta=document.querySelector(".note-inp-body");
    if(ta&&!noteForm.title)ta.focus();
    else{const ti=document.querySelector(".note-inp-title");if(ti)ti.focus();}
  },50);
}
function closeNoteEditor(){noteEditorOpen=false;noteEdit=null;render();}

function updateEditorLinkPreviews(){
  const div=document.getElementById("ne-link-previews");
  if(div)div.innerHTML=renderLinkPreviews(noteForm.body,"");
}

function openLockedNoteEditor(id){
  if(!lockUnlocked)return;
  if(id===null){
    noteEdit=null;
    noteForm={title:"",body:"",color:0,pinned:false,locked:true,labels:[]};
  } else {
    const n=NOTES.find(x=>x.id===id);
    if(!n)return;
    noteEdit=id;
    noteForm={title:n.title,body:n.body,color:n.color,pinned:n.pinned,locked:true,labels:[]};
  }
  lockedEditorOpen=true;render();
}
function saveLockedNote(){
  if(!noteForm.title.trim()&&!noteForm.body.trim()){lockedEditorOpen=false;render();return;}
  const now=tdy();
  if(noteEdit!==null){
    NOTES=NOTES.map(n=>n.id===noteEdit?{...n,...noteForm,locked:true,date:now}:n);
  } else {
    NOTES=[{id:Date.now(),date:now,...noteForm,locked:true},...NOTES];
  }
  lockedEditorOpen=false;noteEdit=null;
  save();render();

}

function toggleNoteLabel(labelId){
  const cur=noteForm.labels||[];
  if(cur.includes(labelId)){noteForm.labels=cur.filter(id=>id!==labelId);}
  else{noteForm.labels=[...cur,labelId];}
  render();
}

// PIN helpers
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return h.toString(36);}
function confirmPinSetup(){
  if(lockSetupStep===1){
    if(lockPinInput.length!==4)return;
    lockSetupStep=2;lockConfirmInput="";render();
  } else {
    if(lockConfirmInput.length!==4)return;
    if(lockConfirmInput!==lockPinInput){
      lockPinInput="";lockConfirmInput="";lockSetupStep=1;
      showToast("PIN মিলেনি","আবার চেষ্টা করো","#dc2626");render();return;
    }
    NOTE_PIN=simpleHash(lockPinInput);
    lsSet("ta_note_pin",NOTE_PIN);
    fbSyncSettings();
    lockSetupOpen=false;lockUnlocked=true;lockPinInput="";lockConfirmInput="";lockSetupStep=1;
    render();
  }
}
function tryUnlock(){
  if(simpleHash(lockPinInput)===NOTE_PIN){
    lockUnlocked=true;lockPinInput="";render();
  } else {
    lockPinInput="";
    showToast("ভুল PIN","আবার চেষ্টা করো","#dc2626");render();
  }
}

// ── Label Drag-and-Drop Reorder ───────────────────────────
let labelDragId=null;
let labelDragOverId=null;

function labelDragStart(e,id){
  labelDragId=id;
  e.dataTransfer.effectAllowed="move";
  setTimeout(()=>{
    const el=e.currentTarget;
    if(el)el.style.opacity="0.45";
  },0);
}
function labelDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect="move";
  const row=e.currentTarget;
  const id=row.dataset.id;
  if(id===labelDragId)return;
  // Highlight
  document.querySelectorAll(".lb-sort-row").forEach(r=>r.style.background="");
  row.style.background="rgba(124,58,237,.08)";
  labelDragOverId=id;
}
function labelDrop(e,targetId){
  e.preventDefault();
  if(!labelDragId||labelDragId===targetId)return;
  const fromIdx=LABELS.findIndex(l=>l.id===labelDragId);
  const toIdx=LABELS.findIndex(l=>l.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const newLabels=[...LABELS];
  const [moved]=newLabels.splice(fromIdx,1);
  newLabels.splice(toIdx,0,moved);
  LABELS=newLabels;
  localStorage.setItem("hk_labels",JSON.stringify(LABELS));
  saveLabelsToFb();
  labelDragId=null;labelDragOverId=null;
  render();
}
function labelDragEnd(e){
  document.querySelectorAll(".lb-sort-row").forEach(r=>{r.style.opacity="";r.style.background="";});
  labelDragId=null;labelDragOverId=null;
}

function saveNote(){
  if(!noteForm.title.trim()&&!noteForm.body.trim())return closeNoteEditor();
  // if locked flag set, require PIN setup first
  if(noteForm.locked&&!NOTE_PIN&&!lockUnlocked){
    lockSetupOpen=true;lockSetupStep=1;lockPinInput="";lockConfirmInput="";
    showToast("লক করতে আগে PIN সেট করো","","#7c3aed");
    closeNoteEditor();noteView="locked";render();return;
  }
  const now=tdy();
  if(noteEdit!==null){
    NOTES=NOTES.map(n=>n.id===noteEdit?{...n,...noteForm,date:now}:n);
  } else {
    NOTES=[{id:Date.now(),date:now,...noteForm},...NOTES];
  }
  noteEditorOpen=false;noteEdit=null;
  save();render();
}
function deleteNote(id){
  const n=NOTES.find(x=>x.id===id);
  if(n){
    TRASH=[{...n,deletedAt:Date.now()},...TRASH];
    NOTES=NOTES.filter(x=>x.id!==id);
  }
  if(noteEditorOpen||lockedEditorOpen){noteEditorOpen=false;lockedEditorOpen=false;noteEdit=null;}
  save();render();

}
function restoreNote(id){
  const n=TRASH.find(x=>x.id===id);
  if(n){
    const {deletedAt,...rest}=n;
    NOTES=[{...rest,date:tdy()},...NOTES];
    TRASH=TRASH.filter(x=>x.id!==id);
  }
  save();render();

}
function permanentDelete(id){
  TRASH=TRASH.filter(x=>x.id!==id);
  save();render();

}
function emptyTrash(){
  TRASH=[];
  save();render();

}

// ── Error helpers ─────────────────────────────────────────
// quota/billing exhausted → key permanently mark করো
function isExhaustError(data,status){
  if(!data?.error)return false;
  // Gemini: error.status (uppercase), error.code (number), error.message
  const geminiStatus=(data.error.status||"").toUpperCase();
  if(geminiStatus==="RESOURCE_EXHAUSTED")return true;
  // OpenAI/OpenRouter: error.code string
  const code=(data.error.code||"").toLowerCase();
  if(["insufficient_quota","billing_hard_limit_reached","usage_limit_exceeded"].includes(code))return true;
  // type field (OpenAI)
  const t=(data.error.type||"").toLowerCase();
  if(["insufficient_quota","usage_limit_exceeded"].includes(t))return true;
  // message-based fallback (quota/billing শেষ হলে)
  const m=(data.error.message||"").toLowerCase();
  if(["quota exceeded","quota_exceeded","insufficient_quota","billing_hard_limit","you exceeded your current quota","exceeded your current quota","credit balance is too low","no credits"].some(s=>m.includes(s)))return true;
  if(m.includes("billing")&&(m.includes("limit")||m.includes("quota")))return true;
  return false;
}
// temporary rate limit → key skip করো কিন্তু exhausted mark করো না
function isRateLimitError(data,status){
  if(status===429){
    if(!data?.error)return true; // 429 কিন্তু error body নেই = rate limit
    const code=(data.error.code||"").toLowerCase();
    const t=(data.error.type||"").toLowerCase();
    const geminiStatus=(data.error.status||"").toUpperCase();
    // quota শেষ হলে isExhaustError এটা ধরবে, এখানে ধরবে না
    if(isExhaustError(data,status))return false;
    // Gemini rate limit codes
    if(geminiStatus==="RATE_LIMIT_EXCEEDED"||code==="rate_limit_exceeded"||t==="rate_limit_error")return true;
    // OpenAI/OpenRouter rate limit
    if(code==="rate_limit_exceeded"||t==="requests"||t==="tokens")return true;
    return true; // বাকি সব 429 = rate limit ধরো
  }
  return false;
}
function isOverloadedError(data,status){
  if(status===529||status===503)return true;
  if(!data?.error)return false;
  const t=(data.error.type||"").toLowerCase();
  const m=(data.error.message||"").toLowerCase();
  return t==="server_error"||["overloaded","service unavailable"].some(s=>t.includes(s)||m.includes(s));
}

// ── API call ──────────────────────────────────────────────
async function tryWithKey(keyObj,messages,systemPrompt){
  const provider=keyObj.provider||"gemini";

  if(provider==="gemini"){
    const filtered=messages.filter((m,i)=>!(i===0&&m.role!=="user"));
    const merged=[];
    for(const m of filtered){
      const prev=merged[merged.length-1];
      if(prev&&prev.role===m.role)prev.content+="\n"+m.content;
      else merged.push({...m});
    }
    const contents=merged.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
    const model=keyObj.model||"gemini-2.0-flash";
    const body={contents,generationConfig:{maxOutputTokens:2048}};
    if(systemPrompt)body.system_instruction={parts:[{text:systemPrompt}]};
    const r=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${keyObj.key}`,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
    );
    const raw=await r.json();
    if(r.status===200&&raw.candidates?.[0])
      return {data:{content:[{type:"text",text:raw.candidates[0].content?.parts?.[0]?.text||""}]},status:200};
    if(raw.error)return {data:{error:{type:raw.error.status||"api_error",message:raw.error.message||"Gemini Error"}},status:r.status};
    const text=raw.promptFeedback?.blockReason?"Safety block: "+raw.promptFeedback.blockReason:"উত্তর পাওয়া যায়নি।";
    return {data:{content:[{type:"text",text}]},status:200};
  }

  if(provider==="openrouter"){
    const model=keyObj.model||"openai/gpt-4o-mini";
    const oaiMsgs=systemPrompt?[{role:"system",content:systemPrompt},...messages.map(m=>({role:m.role,content:m.content}))]
                               :messages.map(m=>({role:m.role,content:m.content}));
    const r=await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+keyObj.key,
        "HTTP-Referer":"https://tareqrayhan321.github.io","X-Title":"Tareq's Assistant"},
      body:JSON.stringify({model,messages:oaiMsgs,max_tokens:1000})});
    const raw=await r.json();
    if(r.status===200&&raw.choices?.[0])
      return {data:{content:[{type:"text",text:raw.choices[0].message?.content||""}]},status:200};
    if(raw.error)return {data:{error:{type:raw.error.type||"api_error",message:raw.error.message||"OpenRouter Error"}},status:r.status};
    return {data:{error:{type:"api_error",message:"OpenRouter error (HTTP "+r.status+")"}},status:r.status};
  }

  if(provider==="openai"){
    const model=keyObj.model||"gpt-4o-mini";
    const oaiMsgs=systemPrompt?[{role:"system",content:systemPrompt},...messages.map(m=>({role:m.role,content:m.content}))]
                               :messages.map(m=>({role:m.role,content:m.content}));
    const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+keyObj.key},
      body:JSON.stringify({model,messages:oaiMsgs,max_tokens:1000})});
    const raw=await r.json();
    if(r.status===200&&raw.choices?.[0])
      return {data:{content:[{type:"text",text:raw.choices[0].message?.content||""}]},status:200};
    if(raw.error)return {data:{error:{type:raw.error.type||"api_error",message:raw.error.message||"OpenAI Error"}},status:r.status};
    return {data:{error:{type:"api_error",message:"OpenAI error (HTTP "+r.status+")"}},status:r.status};
  }

  if(provider==="anthropic"){
    const model=_modelFix[keyObj.model]||keyObj.model||"claude-haiku-4-5-20251001";
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":keyObj.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model,max_tokens:1000,...(systemPrompt?{system:systemPrompt}:{}),messages:messages.map(m=>({role:m.role,content:m.content}))})
    });
    const raw=await r.json();
    if(r.status===200&&raw.content?.[0])return {data:{content:[{type:"text",text:raw.content[0].text||""}]},status:200};
    if(raw.error)return {data:{error:{type:raw.error.type||"api_error",message:raw.error.message||"Anthropic Error"}},status:r.status};
    return {data:{error:{type:"api_error",message:"Anthropic error (HTTP "+r.status+")"}},status:r.status};
  }

  return {data:{error:{type:"api_error",message:"অজানা provider: "+provider}},status:400};
}

async function sendChat(){
  const inp=document.getElementById("chat-inp");
  const msg=(inp?inp.value:chatInpVal).trim();
  if(!msg||chatLoading)return;

  chatMsgs=[...chatMsgs,{role:"user",content:msg}];
  chatInpVal="";chatLoading=true;
  if(inp){inp.value="";inp.style.height="auto";}
  render();

  let systemPrompt;
  try{systemPrompt=buildSystemPrompt();}
  catch(e){systemPrompt=`তুমি Tareq-এর Personal Assistant। বাংলায় সংক্ষিপ্ত ও স্পষ্ট উত্তর দাও। আজকের তারিখ: ${tdy()}`;}

  const history=chatMsgs.slice(-20);
  let replied=false;

  // ── AI response প্রসেস করার helper ──────────────────────
  function processAIResponse(raw){
    let parsed=null;
    try{
      const clean=raw.replace(/```json([\s\S]*?)```/g,(_,g)=>g.trim()).replace(/```/g,"").trim();
      if(clean.startsWith("{"))parsed=JSON.parse(clean);
    }catch(_){}

    if(parsed?.actions?.length>0){
      const done=[];
      for(const a of parsed.actions){
        if(a.type==="add_task"){
          TASKS=[...TASKS,{id:Date.now()+Math.random(),title:a.title||"নতুন কাজ",date:a.date||tdy(),time:a.time||"",alarm:!!a.alarm,alarmTime:a.alarmTime||"09:00",repeat:a.repeat||"once",priority:a.priority||"mid",category:a.category||"ব্যক্তিগত",note:a.note||"",done:false}];
          done.push("✅ কাজ যোগ: "+a.title+(a.alarmTime?" ⏰"+a.alarmTime:""));
        }else if(a.type==="add_expense"){
          TX=[...TX,{id:Date.now()+Math.random(),type:"expense",amount:Number(a.amount)||0,category:a.category||"অন্যান্য খরচ",note:a.note||"",date:a.date||tdy()}];
          done.push("💸 খরচ: ৳"+Number(a.amount).toLocaleString()+" ("+a.category+")");
        }else if(a.type==="add_income"){
          TX=[...TX,{id:Date.now()+Math.random(),type:"income",amount:Number(a.amount)||0,category:a.category||"অন্যান্য আয়",note:a.note||"",date:a.date||tdy()}];
          done.push("💰 আয়: ৳"+Number(a.amount).toLocaleString()+" ("+a.category+")");
        }else if(a.type==="add_note"){
          NOTES=[{id:Date.now()+Math.random(),title:a.title||"",body:a.body||"",color:0,pinned:false,date:tdy(),labels:[]},...NOTES];
          done.push("📝 নোট: "+(a.title||(a.body||"").slice(0,30)));
        }else if(a.type==="complete_task"){
          const t=TASKS.find(t=>String(t.id)===String(a.id));
          if(t){TASKS=TASKS.map(x=>x.id===t.id?{...x,done:true}:x);done.push("✔️ সম্পন্ন: "+t.title);}
        }else if(a.type==="delete_task"){
          const t=TASKS.find(t=>String(t.id)===String(a.id));
          if(t){TASKS=TASKS.filter(x=>x.id!==t.id);done.push("🗑️ মুছলাম: "+t.title);}
        }else if(a.type==="delete_tx"){
          const t=TX.find(t=>String(t.id)===String(a.id));
          if(t){TX=TX.filter(x=>x.id!==t.id);done.push("🗑️ লেনদেন মুছলাম");}
        }
      }
      save();
      const reply=(parsed.reply||"সম্পন্ন।")+(done.length?"\n\n"+done.join("\n"):"");
      chatMsgs=[...chatMsgs,{role:"assistant",content:reply}];
      if(done.length)addSysNotif("db_sync","AI: "+done.length+"টি কাজ সম্পন্ন");
    }else{
      chatMsgs=[...chatMsgs,{role:"assistant",content:parsed?.reply||raw}];
    }
  }

  // ── ১. প্রথমে User-added Keys চেষ্টা করো ────────────────
  const liveKeys=apiKeys.filter(k=>!k.exhausted);
  for(const keyObj of liveKeys){
    try{
      const {data,status}=await tryWithKey(keyObj,history,systemPrompt);
      // quota/billing exhausted → key permanently বন্ধ করো
      if(isExhaustError(data,status)){
        markKeyExhausted(keyObj.id);
        const name=keyObj.label||"Key "+(apiKeys.findIndex(k=>k.id===keyObj.id)+1);
        addSysNotif("api_limit",`${name}: কোটা শেষ, পরের Key-তে যাচ্ছে`);
        continue;
      }
      // temporary rate limit → skip করো, exhausted mark করো না
      if(isRateLimitError(data,status)){
        const name=keyObj.label||"Key "+(apiKeys.findIndex(k=>k.id===keyObj.id)+1);
        addSysNotif("api_limit",`${name}: Rate limit — পরের Key চেষ্টা করছি`);
        continue;
      }
      if(isOverloadedError(data,status))continue;
      if(data.error){
        addSysNotif("api_error",(keyObj.label||"Key")+" — "+(data.error.message||"error"));
        continue;
      }
      const raw=data.content?.[0]?.text||"উত্তর পাওয়া যায়নি।";
      processAIResponse(raw);
      replied=true;break;
    }catch(e){
      const isCors=e.message&&(e.message.includes("Failed to fetch")||e.message.includes("NetworkError")||e.message.includes("CORS")||e.message.includes("Load failed"));
      const errMsg=isCors
        ?"CORS বা নেটওয়ার্ক ব্লক — এই provider browser থেকে সরাসরি কাজ করে না"
        :"নেটওয়ার্ক সমস্যা: "+e.message;
      console.error("sendChat ["+(keyObj.label||keyObj.id)+"]:",e.message);
      addSysNotif("api_error",(keyObj.label||"Key")+" — "+errMsg);
      continue;
    }
  }

  if(!replied){
    const hasKeys=apiKeys.filter(k=>!k.exhausted).length>0;
    chatMsgs=[...chatMsgs,{role:"assistant",content:hasKeys
      ?"⚠️ API সংযোগ ব্যর্থ — বিজ্ঞপ্তি ট্যাবে বিস্তারিত দেখো। Key সঠিক কিনা ও ইন্টারনেট চেক করো।"
      :"⚠️ কোনো সক্রিয় API Key নেই — API Keys ট্যাবে Key যোগ করো।"}];
  }

  chatLoading=false;render();
  setTimeout(()=>{const ca=document.getElementById("chat-area");if(ca)ca.scrollTop=ca.scrollHeight;},50);
}



// ── AI-এর জন্য শুধু Local data ─────────────────────────────
// Firebase-এর সাথে AI-এর কোনো সংযোগ নেই
// Firebase → local sync হয় (_fbOnReady-তে), AI সেই local data পড়ে


function toggleVoice(){}
function showVoiceToast(msg,duration){
  const el=document.getElementById("voice-toast");
  if(!el)return;
  el.textContent=msg;
  el.classList.add("show");
  if(duration>0)setTimeout(()=>el.classList.remove("show"),duration);
}
function hideVoiceToast(){
  const el=document.getElementById("voice-toast");
  if(el)el.classList.remove("show");
}

// ── Manual Sync ───────────────────────────────────────────
async function manualFbSync(){
  if(!window._fbReady){
    showToast("Firebase সংযুক্ত নয়","কিছুক্ষণ অপেক্ষা করো","#f59e0b");return;
  }
  updateSyncStatus("syncing");
  try{
    await Promise.all([
      window.fbSetCollection("transactions",TX,"id"),
      window.fbSetCollection("tasks",TASKS,"id"),
      window.fbSetCollection("notes",NOTES,"id"),
      window.fbSetCollection("trash",TRASH,"id"),
      window.fbSetCollection("labels",LABELS,"id"),
      window.fbSetSettings({apiKeys,notePIN:NOTE_PIN||"",updatedAt:new Date().toISOString()}),
    ]);
    updateSyncStatus("synced");
    addSysNotif("db_sync","ম্যানুয়াল সিঙ্ক সফল হয়েছে ✓");
  }catch(e){
    updateSyncStatus("error");
    showToast("সিঙ্ক ব্যর্থ","Firebase-এ সংযোগ সমস্যা","#dc2626");
    addSysNotif("db_error","ম্যানুয়াল সিঙ্ক ব্যর্থ: "+e.message);
  }
  render();
}

// ── Init ─────────────────────────────────────────────────
render();

// Firebase ready — module script এর পরে run হয় তাই setTimeout দিয়ে
setTimeout(()=>{
  if(window._fbUid){
    const uid=window._fbUid;
    const msg="Firebase সংযোগ সফল ✅ (UID: "+uid.slice(0,12)+"...)";
    addSysNotif("fb_connected",msg);
    window._fbOnReady();
  }
},500);
</script>
